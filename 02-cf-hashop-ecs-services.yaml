        Fn::ImportValue:
          Fn::Sub: '${FoundationStackName}-EcsClusterName'
      TaskDefinition: !Ref UserApiTaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredApiCount
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 0
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - Fn::ImportValue:
                Fn::Sub: '${FoundationStackName}-EcsServiceSecurityGroupId'
          Subnets:
            - Fn::ImportValue:
                Fn::Sub: '${FoundationStackName}-PrivateAppSubnetA'
            - Fn::ImportValue:
                Fn::Sub: '${FoundationStackName}-PrivateAppSubnetB'
      LoadBalancers:
        - ContainerName: user-service
          ContainerPort: 3000
          TargetGroupArn:
            Fn::ImportValue:
              Fn::Sub: '${FoundationStackName}-UserTargetGroupArn'
      ServiceConnectConfiguration:
        Enabled: true
        Namespace:
          Fn::ImportValue:
            Fn::Sub: '${FoundationStackName}-ServiceDiscoveryNamespaceArn'

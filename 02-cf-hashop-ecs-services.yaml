AWSTemplateFormatVersion: '2010-09-09'
Description: >
  HaShop ECS services stack. Creates Fargate task definitions and ECS services
  for API containers and workers. This version uses the clean PrimaryDbSecretArn
  exported by 01-cf-hashop-foundation-v5-primary-rds-clean.yaml.

Parameters:
  FoundationStackName:
    Type: String
    Default: cf-hashop-foundation
    Description: Name of the foundation stack created from 01-cf-hashop-foundation.yaml.
  ProjectName:
    Type: String
    Default: cf-hashop
    Description: Must match the ProjectName used by the foundation stack for log group names.
  EnvironmentName:
    Type: String
    Default: test
  DesiredApiCount:
    Type: Number
    Default: 1
    MinValue: 0
  DesiredWorkerCount:
    Type: Number
    Default: 1
    MinValue: 0

  UserServiceImageUri:
    Type: String
    Default: 538661800393.dkr.ecr.ap-southeast-1.amazonaws.com/hashop/user-service:latest
  ProductServiceImageUri:
    Type: String
    Default: 538661800393.dkr.ecr.ap-southeast-1.amazonaws.com/hashop/product-service:latest
  InventoryServiceImageUri:
    Type: String
    Default: 538661800393.dkr.ecr.ap-southeast-1.amazonaws.com/hashop/inventory-service:latest
  CartServiceImageUri:
    Type: String
    Default: 538661800393.dkr.ecr.ap-southeast-1.amazonaws.com/hashop/cart-service:latest
  OrderServiceImageUri:
    Type: String
    Default: 538661800393.dkr.ecr.ap-southeast-1.amazonaws.com/hashop/order-service:latest
  PaymentServiceImageUri:
    Type: String
    Default: 538661800393.dkr.ecr.ap-southeast-1.amazonaws.com/hashop/payment-service:latest
  NotificationServiceImageUri:
    Type: String
    Default: 538661800393.dkr.ecr.ap-southeast-1.amazonaws.com/hashop/notification-service:latest

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Foundation stack
        Parameters:
          - FoundationStackName
          - ProjectName
          - EnvironmentName
      - Label:
          default: Desired counts
        Parameters:
          - DesiredApiCount
          - DesiredWorkerCount
      - Label:
          default: Container images
        Parameters:
          - UserServiceImageUri
          - ProductServiceImageUri
          - InventoryServiceImageUri
          - CartServiceImageUri
          - OrderServiceImageUri
          - PaymentServiceImageUri
          - NotificationServiceImageUri

Resources:
  # =========================================================
  # Task Definitions - API services
  # =========================================================
  UserApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-${EnvironmentName}-user-api'
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: '512'
      Memory: '1024'
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn:
        Fn::ImportValue:
          Fn::Sub: '${FoundationStackName}-EcsTaskExecutionRoleArn'
      TaskRoleArn:
        Fn::ImportValue:
          Fn::Sub: '${FoundationStackName}-UserTaskRoleArn'
      ContainerDefinitions:
        - Name: user-service
          Image: !Ref UserServiceImageUri
          Cpu: 512
          Memory: 1024
          MemoryReservation: 512
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              HostPort: 3000
              Protocol: tcp
              Name: user-http
              AppProtocol: http
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: DB_NAME
              Value: ecommerce_user_db
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: PORT
              Value: '3000'
          Secrets:
            - Name: DB_HOST
              ValueFrom: !Sub
                - '${SecretArn}:host::'
                - SecretArn:
                    Fn::ImportValue:
                      Fn::Sub: '${FoundationStackName}-PrimaryDBSecretArn'
            - Name: DB_USER
              ValueFrom: !Sub
                - '${SecretArn}:username::'
                - SecretArn:
                    Fn::ImportValue:
                      Fn::Sub: '${FoundationStackName}-PrimaryDBSecretArn'
            - Name: DB_PASSWORD
              ValueFrom: !Sub
                - '${SecretArn}:password::'
                - SecretArn:
                    Fn::ImportValue:
                      Fn::Sub: '${FoundationStackName}-PrimaryDBSecretArn'
            - Name: COGNITO_USER_POOL_ID
              ValueFrom: !Sub
                - '${SecretArn}:COGNITO_USER_POOL_ID::'
                - SecretArn:
                    Fn::ImportValue:
                      Fn::Sub: '${FoundationStackName}-CognitoSecretArn'
            - Name: COGNITO_APP_CLIENT_ID
              ValueFrom: !Sub
                - '${SecretArn}:COGNITO_APP_CLIENT_ID::'
                - SecretArn:
                    Fn::ImportValue:
                      Fn::Sub: '${FoundationStackName}-CognitoSecretArn'
            - Name: COGNITO_CLIENT_SECRET
              ValueFrom: !Sub
                - '${SecretArn}:COGNITO_CLIENT_SECRET::'
                - SecretArn:
                    Fn::ImportValue:
                      Fn::Sub: '${FoundationStackName}-CognitoSecretArn'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub '/ecs/${ProjectName}/user-service'
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs


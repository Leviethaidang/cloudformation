AWSTemplateFormatVersion: '2010-09-09'
Description: HaShop database initialization stack. Creates a temporary private EC2 initializer to run SQL against the primary RDS instance created by the foundation stack.

Parameters:
  FoundationStackName:
    Type: String
    Default: cf-hashop-foundation
    Description: Name of the foundation stack that exports VPC, subnet, security group, and DB secret values.

  ProjectName:
    Type: String
    Default: cf-hashop

  EnvironmentName:
    Type: String
    Default: test

  DbInitInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
    Description: Temporary EC2 instance type used only to initialize databases.

  BootstrapAdminEmail:
    Type: String
    Default: admin@example.com
    Description: Bootstrap admin email for the lab environment.

  BootstrapAdminPassword:
    Type: String
    NoEcho: true
    Default: Letmein123!!!
    MinLength: 8
    Description: Bootstrap admin password. Default uses an uppercase letter to satisfy the Cognito password policy.

  BootstrapAdminFullName:
    Type: String
    Default: HaShop Admin
    Description: Full name for the bootstrap admin user.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI.

Resources:
  DbInitRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${EnvironmentName}-db-init-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: db-init-read-secrets-and-signal
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - Fn::ImportValue:
                      Fn::Sub: '${FoundationStackName}-PrimaryDBSecretArn'
              - Effect: Allow
                Action:
                  - cloudformation:SignalResource
                Resource: '*'
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminUpdateUserAttributes
                Resource:
                  - Fn::Sub:
                      - 'arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ImportedUserPoolId}'
                      - ImportedUserPoolId:
                          Fn::ImportValue:
                            Fn::Sub: '${FoundationStackName}-CognitoUserPoolId'

  DbInitInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${ProjectName}-${EnvironmentName}-db-init-profile'
      Roles:
        - !Ref DbInitRole

  DbInitInstance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT25M
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref DbInitInstanceType
      IamInstanceProfile: !Ref DbInitInstanceProfile
      SubnetId:
        Fn::ImportValue:
          Fn::Sub: '${FoundationStackName}-PrivateAppSubnetA'
      SecurityGroupIds:
        - Fn::ImportValue:
            Fn::Sub: '${FoundationStackName}-EcsServiceSecurityGroupId'
      InstanceInitiatedShutdownBehavior: stop
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${EnvironmentName}-db-init-runner'
        - Key: Purpose
          Value: Run HaShop database initialization SQL once, then delete this stack.
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              set -euo pipefail

              exec > >(tee /var/log/hashop-db-init.log | logger -t hashop-db-init -s 2>/dev/console) 2>&1

              signal_result() {
                local exit_code="$?"
                echo "[DB-INIT] Signaling CloudFormation with exit code $exit_code"
                if [ -x /opt/aws/bin/cfn-signal ]; then
                  /opt/aws/bin/cfn-signal -e "$exit_code" --stack '${AWS::StackName}' --resource DbInitInstance --region '${AWS::Region}' || true
                else
                  echo "[DB-INIT] cfn-signal not found. CloudFormation may wait until timeout."
                fi

                if [ "$exit_code" -eq 0 ]; then
                  echo "[DB-INIT] Initialization completed. Stopping temporary instance."
                  shutdown -h now || true
                fi
              }
              trap signal_result EXIT

              echo "[DB-INIT] Installing dependencies..."
              dnf update -y
              dnf install -y awscli python3-pip aws-cfn-bootstrap
              python3 -m pip install --no-cache-dir --break-system-packages PyMySQL==1.1.1 || python3 -m pip install --no-cache-dir PyMySQL==1.1.1

              export AWS_REGION='${AWS::Region}'
              PRIMARY_DB_SECRET_ARN='${PrimaryDBSecretArn}'
              COGNITO_USER_POOL_ID='${CognitoUserPoolId}'
              ADMIN_EMAIL='${BootstrapAdminEmail}'
              ADMIN_PASSWORD='${BootstrapAdminPassword}'
              ADMIN_FULL_NAME='${BootstrapAdminFullName}'

              echo "[DB-INIT] Loading primary database secret from Secrets Manager..."
              PRIMARY_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id "$PRIMARY_DB_SECRET_ARN" --region "$AWS_REGION" --query SecretString --output text)
              export PRIMARY_SECRET_JSON

              cat > /tmp/hashop-init.sql <<'SQL'
              CREATE DATABASE IF NOT EXISTS ecommerce_user_db;
              USE ecommerce_user_db;

              CREATE TABLE IF NOT EXISTS users (
                  user_id VARCHAR(128) NOT NULL PRIMARY KEY,
                  full_name VARCHAR(100),
                  email VARCHAR(100) NOT NULL UNIQUE,
                  phone_number VARCHAR(20),
                  default_shipping_address TEXT,
                  status VARCHAR(30) DEFAULT 'ACTIVE',
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
              );

              CREATE DATABASE IF NOT EXISTS ecommerce_product_db;
              USE ecommerce_product_db;

              CREATE TABLE IF NOT EXISTS categories (
                  category_id INT AUTO_INCREMENT PRIMARY KEY,
                  category_name VARCHAR(100) NOT NULL UNIQUE,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );

              INSERT IGNORE INTO categories (category_name)
              VALUES
              ('Áo thun'),
              ('Áo sơ mi'),
              ('Áo khoác'),
              ('Áo len'),
              ('Áo polo'),
              ('Quần jean'),
              ('Quần tây'),
              ('Quần short'),
              ('Quần kaki'),
              ('Quần jogger'),
              ('Thắt lưng'),
              ('Ví da'),
              ('Mũ nón'),
              ('Kính mát'),
              ('Túi xách'),
              ('Giày dép'),
              ('Giày sneaker'),
              ('Giày tây'),
              ('Giày lười'),
              ('Dép sandal');

              CREATE TABLE IF NOT EXISTS products (
                  product_id INT AUTO_INCREMENT PRIMARY KEY,
                  product_name VARCHAR(200) NOT NULL,
                  description TEXT NULL,
                  category_id INT,
                  price DECIMAL(12, 2) NOT NULL,
                  image_key VARCHAR(500),

                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

                  FOREIGN KEY (category_id) REFERENCES categories(category_id) ON DELETE SET NULL
              );

              CREATE TABLE IF NOT EXISTS sizes (
                  size_id INT AUTO_INCREMENT PRIMARY KEY,
                  size_name VARCHAR(20) NOT NULL UNIQUE,
                  display_order INT NOT NULL DEFAULT 0,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );

              CREATE TABLE IF NOT EXISTS colors (
                  color_id INT AUTO_INCREMENT PRIMARY KEY,
                  color_name VARCHAR(100) NOT NULL UNIQUE,
                  color_code VARCHAR(20) NULL,
                  display_order INT NOT NULL DEFAULT 0,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );

              CREATE TABLE IF NOT EXISTS product_images (
                  image_id INT AUTO_INCREMENT PRIMARY KEY,
                  product_id INT NOT NULL,
                  image_key VARCHAR(500) NOT NULL,
                  sort_order INT NOT NULL DEFAULT 0,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,

                  FOREIGN KEY (product_id) REFERENCES products(product_id) ON DELETE CASCADE
              );

              CREATE TABLE IF NOT EXISTS product_variants (
                  variant_id INT AUTO_INCREMENT PRIMARY KEY,
                  product_id INT NOT NULL,
                  size_id INT NOT NULL,
                  color_id INT NOT NULL,
                  is_active TINYINT(1) NOT NULL DEFAULT 1,

                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

                  FOREIGN KEY (product_id) REFERENCES products(product_id) ON DELETE CASCADE,
                  FOREIGN KEY (size_id) REFERENCES sizes(size_id),
                  FOREIGN KEY (color_id) REFERENCES colors(color_id),

                  UNIQUE KEY unique_product_size_color (product_id, size_id, color_id)
              );

              INSERT IGNORE INTO sizes (size_name, display_order)
              VALUES
              ('FREE', 0),
              ('S', 1),
              ('M', 2),
              ('L', 3),
              ('XL', 4),
              ('XXL', 5);

              INSERT IGNORE INTO colors (color_name, color_code, display_order)
              VALUES
              ('Mặc định', NULL, 0),
              ('Đen', '#000000', 1),
              ('Trắng', '#FFFFFF', 2),
              ('Xám', '#808080', 3),
              ('Xanh', '#0000FF', 4),
              ('Đỏ', '#FF0000', 5),
              ('Vàng', '#FFFF00', 6),
              ('Tím', '#800080', 7),
              ('Nâu', '#8B4513', 8),
              ('Be', '#F5F5DC', 9);

              CREATE DATABASE IF NOT EXISTS ecommerce_inventory_db;
              USE ecommerce_inventory_db;

              CREATE TABLE IF NOT EXISTS inventory_items (
                  inventory_id INT AUTO_INCREMENT PRIMARY KEY,

                  variant_id INT NOT NULL UNIQUE,
                  product_id INT NOT NULL,

                  quantity_on_hand INT NOT NULL DEFAULT 0,
                  quantity_reserved INT NOT NULL DEFAULT 0,
                  quantity_sold INT NOT NULL DEFAULT 0,
                  is_active TINYINT(1) NOT NULL DEFAULT 1,

                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

                  CHECK (quantity_on_hand >= 0),
                  CHECK (quantity_reserved >= 0),
                  CHECK (quantity_sold >= 0),
                  CHECK (quantity_reserved <= quantity_on_hand)
              );

              CREATE TABLE IF NOT EXISTS inventory_movements (
                  movement_id INT AUTO_INCREMENT PRIMARY KEY,

                  variant_id INT NOT NULL,
                  movement_type ENUM(
                      'INIT',
                      'ADMIN_ADJUST',
                      'RESERVE',
                      'RELEASE',
                      'COMMIT',
                      'SOLD'
                  ) NOT NULL,

                  quantity INT NOT NULL,
                  reference_type VARCHAR(50) NULL,
                  reference_id VARCHAR(100) NULL,
                  note TEXT NULL,

                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );

              CREATE DATABASE IF NOT EXISTS ecommerce_cart_db;
              USE ecommerce_cart_db;

              CREATE TABLE IF NOT EXISTS carts (
                  cart_id INT AUTO_INCREMENT PRIMARY KEY,
                  user_id VARCHAR(128) NOT NULL UNIQUE,

                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
              );

              CREATE TABLE IF NOT EXISTS cart_items (
                  cart_item_id INT AUTO_INCREMENT PRIMARY KEY,

                  cart_id INT NOT NULL,
                  product_id INT NOT NULL,
                  variant_id INT NOT NULL,

                  quantity INT NOT NULL DEFAULT 1,

                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

                  UNIQUE KEY unique_cart_variant (cart_id, variant_id),

                  INDEX idx_cart_id (cart_id),
                  INDEX idx_product_id (product_id),
                  INDEX idx_variant_id (variant_id),

                  FOREIGN KEY (cart_id) REFERENCES carts(cart_id) ON DELETE CASCADE
              );

              CREATE DATABASE IF NOT EXISTS ecommerce_order_db;
              USE ecommerce_order_db;

              CREATE TABLE IF NOT EXISTS orders (
                  order_id BIGINT AUTO_INCREMENT PRIMARY KEY,

                  user_id VARCHAR(128) NOT NULL,
                  customer_email VARCHAR(255) NULL,

                  source_type VARCHAR(20) NOT NULL,

                  receiver_name VARCHAR(100) NOT NULL,
                  receiver_phone VARCHAR(30) NOT NULL,
                  shipping_address TEXT NOT NULL,

                  payment_method_id BIGINT NOT NULL,

                  payment_method_type VARCHAR(20) NOT NULL,
                  payment_method_display_name VARCHAR(255) NOT NULL,

                  order_status VARCHAR(30) NOT NULL DEFAULT 'PENDING_PAYMENT',

                  payment_status VARCHAR(30) NOT NULL DEFAULT 'PENDING',

                  total_quantity INT NOT NULL DEFAULT 0,
                  total_amount DECIMAL(12,2) NOT NULL DEFAULT 0,

                  payment_request_message_id VARCHAR(255),
                  payment_transaction_id VARCHAR(255),
                  payment_error TEXT,
                  paid_at TIMESTAMP NULL,

                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

                  INDEX idx_orders_user_id (user_id),
                  INDEX idx_orders_order_status (order_status),
                  INDEX idx_orders_payment_status (payment_status),
                  INDEX idx_orders_created_at (created_at)
              );

              CREATE TABLE IF NOT EXISTS order_items (
                  order_item_id BIGINT AUTO_INCREMENT PRIMARY KEY,

                  order_id BIGINT NOT NULL,
                  product_id INT NOT NULL,
                  variant_id INT NOT NULL,

                  product_name VARCHAR(200) NOT NULL,
                  category_name VARCHAR(100),

                  size_name VARCHAR(50),
                  color_name VARCHAR(100),
                  color_code VARCHAR(20),

                  image_url VARCHAR(1000),

                  unit_price DECIMAL(12,2) NOT NULL,
                  quantity INT NOT NULL,
                  subtotal DECIMAL(12,2) NOT NULL,

                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,

                  INDEX idx_order_items_order_id (order_id),
                  INDEX idx_order_items_product_id (product_id),
                  INDEX idx_order_items_variant_id (variant_id),

                  CONSTRAINT fk_order_items_order
                      FOREIGN KEY (order_id)
                      REFERENCES orders(order_id)
                      ON DELETE CASCADE
              );

              CREATE DATABASE IF NOT EXISTS ecommerce_payment_db;
              USE ecommerce_payment_db;

              CREATE TABLE IF NOT EXISTS user_payment_methods (
                  payment_method_id INT AUTO_INCREMENT PRIMARY KEY,

                  user_id VARCHAR(128) NOT NULL,

                  method_type VARCHAR(20) NOT NULL,
                  display_name VARCHAR(255) NOT NULL,

                  momo_phone_number VARCHAR(20),

                  bank_name VARCHAR(100),
                  bank_account_number VARCHAR(50),

                  is_default BOOLEAN DEFAULT FALSE,
                  is_system_default BOOLEAN DEFAULT FALSE,

                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

                  INDEX idx_user_id (user_id),
                  INDEX idx_user_default (user_id, is_default)
              );

              CREATE TABLE IF NOT EXISTS payment_transactions (
                  payment_transaction_id VARCHAR(100) PRIMARY KEY,
                  order_id BIGINT NOT NULL UNIQUE,
                  user_id VARCHAR(128),
                  amount DECIMAL(12,2) NOT NULL,
                  currency VARCHAR(10) DEFAULT 'VND',
                  payment_method_id BIGINT,
                  payment_method_type VARCHAR(20),
                  payment_status VARCHAR(20) NOT NULL,
                  failure_reason TEXT,
                  raw_event JSON,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
              );

              SQL

              cat > /tmp/run_sql.py <<'PY'
              import json
              import os
              import pymysql

              def clean_sql(raw_sql: str) -> str:
                  cleaned_lines = []
                  for line in raw_sql.splitlines():
                      stripped = line.strip()
                      if stripped.startswith("--"):
                          continue
                      cleaned_lines.append(line)
                  return "\n".join(cleaned_lines)

              def run_sql(secret_env_name: str, sql_path: str, label: str) -> None:
                  secret = json.loads(os.environ[secret_env_name])
                  host = secret["host"]
                  port = int(secret.get("port", 3306))
                  user = secret["username"]
                  password = secret["password"]

                  print(f"[DB-INIT] Connecting to {label}: {host}:{port}")
                  conn = pymysql.connect(
                      host=host,
                      port=port,
                      user=user,
                      password=password,
                      autocommit=True,
                      charset="utf8mb4",
                  )

                  try:
                      with conn.cursor() as cursor:
                          with open(sql_path, "r", encoding="utf-8") as f:
                              raw_sql = clean_sql(f.read())

                          statements = [stmt.strip() for stmt in raw_sql.split(";") if stmt.strip()]

                          for index, statement in enumerate(statements, start=1):
                              first_line = statement.splitlines()[0].strip()
                              print(f"[DB-INIT] {label} statement {index}/{len(statements)}: {first_line[:120]}")
                              cursor.execute(statement)

                          print(f"[DB-INIT] {label} SQL completed. Statements executed: {len(statements)}")
                  finally:
                      conn.close()

              run_sql("PRIMARY_SECRET_JSON", "/tmp/hashop-init.sql", "primary-db")
              print("[DB-INIT] All database initialization completed successfully.")
              PY

              echo "[DB-INIT] Running SQL initialization..."
              python3 /tmp/run_sql.py

              echo "[DB-INIT] Bootstrapping Cognito admin user..."
              if aws cognito-idp admin-get-user \
                --user-pool-id "$COGNITO_USER_POOL_ID" \
                --username "$ADMIN_EMAIL" \
                --region "$AWS_REGION" >/tmp/hashop-admin-user.json 2>/dev/null; then
                echo "[DB-INIT] Admin user already exists in Cognito: $ADMIN_EMAIL"
              else
                aws cognito-idp admin-create-user \
                  --user-pool-id "$COGNITO_USER_POOL_ID" \
                  --username "$ADMIN_EMAIL" \
                  --user-attributes Name=email,Value="$ADMIN_EMAIL" Name=email_verified,Value=true Name=name,Value="$ADMIN_FULL_NAME" \
                  --message-action SUPPRESS \
                  --region "$AWS_REGION" >/tmp/hashop-admin-create-user.json
                echo "[DB-INIT] Admin user created in Cognito: $ADMIN_EMAIL"
              fi

              aws cognito-idp admin-update-user-attributes \
                --user-pool-id "$COGNITO_USER_POOL_ID" \
                --username "$ADMIN_EMAIL" \
                --user-attributes Name=email_verified,Value=true Name=name,Value="$ADMIN_FULL_NAME" \
                --region "$AWS_REGION"

              aws cognito-idp admin-set-user-password \
                --user-pool-id "$COGNITO_USER_POOL_ID" \
                --username "$ADMIN_EMAIL" \
                --password "$ADMIN_PASSWORD" \
                --permanent \
                --region "$AWS_REGION"

              aws cognito-idp admin-add-user-to-group \
                --user-pool-id "$COGNITO_USER_POOL_ID" \
                --username "$ADMIN_EMAIL" \
                --group-name Admin \
                --region "$AWS_REGION"

              ADMIN_SUB=$(aws cognito-idp admin-get-user \
                --user-pool-id "$COGNITO_USER_POOL_ID" \
                --username "$ADMIN_EMAIL" \
                --region "$AWS_REGION" \
                --query "UserAttributes[?Name=='sub'].Value | [0]" \
                --output text)

              if [ -z "$ADMIN_SUB" ] || [ "$ADMIN_SUB" = "None" ]; then
                echo "[DB-INIT] Could not resolve Cognito sub for admin user."
                exit 1
              fi

              export ADMIN_SUB
              export ADMIN_EMAIL
              export ADMIN_FULL_NAME

              cat > /tmp/bootstrap_admin_db.py <<'PY'
              import json
              import os
              import pymysql

              secret = json.loads(os.environ["PRIMARY_SECRET_JSON"])

              conn = pymysql.connect(
                  host=secret["host"],
                  port=int(secret.get("port", 3306)),
                  user=secret["username"],
                  password=secret["password"],
                  autocommit=True,
                  charset="utf8mb4",
              )

              try:
                  with conn.cursor() as cursor:
                      cursor.execute(
                          """
                          INSERT INTO ecommerce_user_db.users
                              (user_id, full_name, email, phone_number, default_shipping_address, status)
                          VALUES
                              (%s, %s, %s, NULL, NULL, 'ACTIVE')
                          ON DUPLICATE KEY UPDATE
                              full_name = VALUES(full_name),
                              email = VALUES(email),
                              status = 'ACTIVE',
                              updated_at = CURRENT_TIMESTAMP
                          """,
                          (
                              os.environ["ADMIN_SUB"],
                              os.environ["ADMIN_FULL_NAME"],
                              os.environ["ADMIN_EMAIL"],
                          ),
                      )
                  print("[DB-INIT] Admin user inserted/updated in ecommerce_user_db.users.")
              finally:
                  conn.close()
              PY

              python3 /tmp/bootstrap_admin_db.py
              echo "[DB-INIT] Done."
            - PrimaryDBSecretArn:
                Fn::ImportValue:
                  Fn::Sub: '${FoundationStackName}-PrimaryDBSecretArn'
              CognitoUserPoolId:
                Fn::ImportValue:
                  Fn::Sub: '${FoundationStackName}-CognitoUserPoolId'

Outputs:
  DbInitInstanceId:
    Value: !Ref DbInitInstance
  DbInitLogPath:
    Value: /var/log/hashop-db-init.log
  Note:
    Value: Delete this db-init stack after CREATE_COMPLETE. The RDS data will remain because RDS resources are in the foundation stack.
